name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          install -dm 700 ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy "dev@$DEPLOY_HOST" \
            "DEPLOY_PATH=$DEPLOY_PATH bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          git fetch origin main
          git reset --hard origin/main
          if [[ -x ./scripts/deploy.sh ]]; then
            ./scripts/deploy.sh
          else
            echo "::warning::no scripts/deploy.sh found; nothing to do"
          fi
          REMOTE
